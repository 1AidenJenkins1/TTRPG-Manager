// a characters skills as an object
class Skills {
  #skills;

  constructor(args = {}){
    const {
      barter = 0,
      energyWeapons = 0,
      explosives = 0,
      guns = 0,
      lockpick = 0,
      medicine = 0,
      meleeWeapons = 0,
      repair = 0,
      science = 0,
      sneak = 0,
      speech = 0,
      intimidation = 0,
      survival = 0,
      unarmed = 0
    } = args;

    this.#skills = {
      barter,
      energyWeapons,
      explosives,
      guns,
      lockpick,
      medicine,
      meleeWeapons,
      repair,
      science,
      sneak,
      speech,
      intimidation,
      survival,
      unarmed
    };
  }

  get(name) {
    return this.#skills[name];
  }

  getAll() {
    return this.#skills;
  }
}

// a characters SPECIAL stats as an object
class Special {
  #special;

  constructor(args = {}) {
    const {
      strength = 0,
      perception = 0,
      endurance = 0,
      charisma = 0,
      intelligence = 0,
      agility = 0,
      luck = 0
    } = args;

    this.#special = {
      strength,
      perception,
      endurance,
      charisma,
      intelligence,
      agility,
      luck
    };
  }

  get(name) {
    return this.#special[name];
  }

  getAll() {
    return this.#special;
  }
}

// flat and percent Modifiers for skills and special as a object
class Modifiers {
  constructor(sourceModifiers) {
    this.modifiers = {
      flat: {},
      percent: {}
    };

    console.groupCollapsed("Creating Modifiers");
    sourceModifiers.forEach(([stat, mod]) => {
      console.groupCollapsed(`Creating ${mod.type} Modifier For ${stat}`);
      console.log(mod);
      
      const type = mod.type.toLowerCase();
      const currentValue = this.modifiers[type][stat] || 0;
      const value = (type === "percent") 
        ? (currentValue + (mod.value / 100)) 
        : (mod.value);
      
      this.modifiers[type][stat] = Number(value.toFixed(2));
      
      console.groupEnd(`Creating ${mod.type} Modifier For ${stat}`);
    });
    console.groupEnd("Creating Modifiers");
  }

  getFlatModifier(stat) {
    return this.modifiers.flat[stat] || 0;
  }

  getPercentModifier(stat) {
    return this.modifiers.percent[stat] || 0;
  }

  getAll() {
    return this.modifiers;
  }
}

// uses a modifier object to define what a perk does and a requirments to define how to allow use of the perk
class Perks {
  static #perks = {};

  static savePerk(perkObj) {
    if (perkObj) {
      Perks.#perks[perkObj.name] = perkObj;
      return perkObj;
    }
    return null;
  }

  static has(name) {
    if (name in Perks.#perks)
    { return true; }
    return false;
  }

  static get(name) {
    if (Perks.has(name)) {
      return Perks.#perks[name];
    }
    return null;
  }

  static getAll() {
    return Perks.#perks;
  }
  
  static createPerk (args = {}) {
    const {
      name = null,
      imageUrl = "",
      info = "",
      modifier = new Modifiers()
    } = args;

    if (!name) 
    { return null; }

    if (Perks.has(name)) 
    { return Perks.getPerk(name); }

    const perkObj = {
      name,
      imageUrl,
      info,
      modifier
    };

    Perks.savePerk(perkObj);
    return perkObj;
  }
}

// uses a modifier object to define what a class does
class Classes {
  // Classes = [Class name, object( name, info, imageUrl, modifier)]
  static #classes = {};

  static loadFromFile() {
    console.log("Loading TTRPG Classes");
  }

  static saveClass(classObj) {
    if (classObj) {
      Perks.#classes[classObj.com] = classObj;
      return classObj;
    }
    return null;
  }

  static has(name) {
    if (name in Classes.#classes)
    { return true; }
    return false;
  }

  static get(name) {
    if (Classes.has(name)) {
      return Classes.#classes[name];
    }
    return null;
  }

  static getAll() {
    return Classes.#classes;
  }
  
  static createClass (args = {}) {
    const {
      name = null,
      imageUrl = "",
      info = "",
      modifier = new Modifiers()
    } = args;

    if (!name) {
      return null;
    }
    if (Classes.has(name)) {
      return Classes.getClass(name);
    }

    const classObj = {
      name,
      imageUrl,
      info,
      modifier
    };

    Classes.saveClass(classObj);
    return classObj;
  }
}

// the character class for the TTRPG saved as an object
class Character {
  constructor (args = {}) {
    const {
      name = "Unnamed Character",
      id = createId(),
      race = null,
      characterClass = null,

      special = null,
      skills = {},
      perks = [],
      inventory = {}
    } = args;

    this.name = name;
    this.id = id;
    this.race = race;
    this.class = characterClass;

    this.special = special;
    this.skills = skills;
    this.perks = perks;
    this.inventory = inventory;

    return this;
  }

  saveData(type){
    console.log("Saving Character");
    google.script.run
      .withSuccessHandler(() => 
        { console.log("Character Saved!"); })
      .saveData(
        "Character", 
        { data: (this) }
      );
  }

  hasPerk(name) {
    if (this.perks.get(name)) 
    { return true; }
    return false;
  }

  addPerk(perkObj) {
    if (this.hasPerk(perkObj.name)) 
    { return perkObj; }

    this.perks.set(perkObj.name, perkObj);
    return perkObj;
  }

  getPerks(){
    return this.perks;
  }

  getPerk(name){
    return this.perks.get(name);
  }

  hasClass(name) {
    if (this.class == Classes.get(name)) 
    { return true; }
    return false;
  }

  addClass(classObj) {
    if (this.hasClass(classObj.name)) 
    { return classObj; }
    this.class = classObj;
    return classObj;
  }

  getClass(){
    return this.class;
  }
}
